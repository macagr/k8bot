name: CI Plumbing Test

# This tells the action to run every time you push code to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  say-hello:
    # This tells Gitea to route this job to your self-hosted Act Runner
    runs-on: ubuntu-latest 
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 👋 Test Execution
        run: |
          echo "🤖 Hello from your Kubernetes cluster!"
          echo "The runner successfully picked up the job."
          
      - name: 📁 Verify Workspace
        run: |
          echo "Here are the files the runner pulled from Gitea:"
          ls -la