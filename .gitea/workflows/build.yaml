name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest 
    
    # 🔒 THE MAGIC BULLET: Elevate the ephemeral token's permissions
    permissions:
      contents: read
      packages: write 
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🖥️ Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: git.mcagr.com 
          # Note: Ensure this evaluates to 'macagr' exactly
          username: ${{ github.repository_owner }} 
          # Back to the automatically generated, temporary token!
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: 🚀 Build and Push (Multi-Arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: git.mcagr.com/${{ github.repository_owner }}/k8bot:latest