apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8bot.fullname" . }}-read-binding
  labels:
    {{- include "k8bot.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "k8bot.fullname" . }}-read-only
subjects:
  - kind: ServiceAccount
    name: {{ include "k8bot.fullname" . }}
    namespace: {{ .Release.Namespace }}